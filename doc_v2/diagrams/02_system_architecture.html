  <text x="70" y="1058" font-size="13" fill="#37474f"><tspan font-weight="700">▸ Hybrid cache (write-through, ADR-001/002):</tspan> primary storage = ws_*Cache, backup = .xlsx w CacheFolder — sync jednokierunkowy</text>
  <text x="70" y="1081" font-size="13" fill="#37474f"><tspan font-weight="700">▸ Convention over configuration:</tspan> rolę usera (kierownik/handlowiec) czytamy z porównania EmailKierownika == EmailHandlowca</text>
  <text x="70" y="1104" font-size="13" fill="#37474f"><tspan font-weight="700">▸ Niezawodność &gt; elastyczność (ADR-003):</tspan> EmailBNC i CacheFolderPath hardcoded i zablokowane w UI (zamiast browse pickera — przycisk tworzący folder)</text>
  <text x="70" y="1127" font-size="13" fill="#37474f"><tspan font-weight="700">▸ Transient artifact (ADR-004):</tspan> plik tymczasowy w %TEMP% kasowany po Send (też w error handlerze, by nie zostawać przy retry)</text>
  <text x="70" y="1150" font-size="13" fill="#37474f"><tspan font-weight="700">▸ Migracja do fazy B:</tspan> mod_DataCacheSync → mod_DataAccess (Repository z ADO), warstwy prezentacji i logiki bez zmian</text>
