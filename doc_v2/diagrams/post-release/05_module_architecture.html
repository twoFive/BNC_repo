<body>

  <text x="70" y="575" font-size="13" fill="#6a1b9a">jedyne miejsce dostępu do worksheets · w fazie B → mod_DataAccess</text>

  <text x="450" y="662" text-anchor="middle" font-size="11" fill="#78909c" font-style="italic">GetUserField · SaveUserData · SyncToFile</text>

  <line x1="450" y1="675" x2="610" y2="795" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- mod_Utils used by all (drawn as floating text) -->
  <text x="250" y="945" font-size="10" fill="#546e7a" text-anchor="middle" font-style="italic">↑ wykorzystywany przez wszystkie warstwy</text>

  <rect x="50" y="990" width="1500" height="80" rx="10" fill="#fafafa" stroke="#90a4ae" stroke-width="1.5"/>

  <text x="180" y="1015" font-size="13" fill="#37474f">strzałki tylko w dół, nigdy w górę · UserForms → logika → sync → worksheets · mod_Utils dostępny dla wszystkich</text>

  <text x="70" y="1062" font-size="12" fill="#1b5e20"><tspan font-weight="700">v1.0.0 post-release:</tspan> wszystkie 4 UserForms zaimplementowane · M6 polish (Tab order, akceleratory Alt+S/Alt+A, error messages) · UAT 3-5 testowych userów zaliczone</text>
