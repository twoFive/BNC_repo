<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BNC_Sender — proces, wartość i rozwój</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; }
  body { width: 1400px; height: 1560px; }
  svg { display: block; }
</style>
</head>
<body>
<svg width="1400" height="1560" viewBox="0 0 1400 1560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e65100"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0d47a1"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4527a0"/>
    </marker>
    <linearGradient id="laneGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9"/><stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="laneOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0"/><stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="laneBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd"/><stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="endBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff59d"/><stop offset="100%" stop-color="#ffd54f"/>
    </linearGradient>
    <linearGradient id="phaseAPanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5"/><stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="phaseBPanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ede7f6"/><stop offset="100%" stop-color="#d1c4e9"/>
    </linearGradient>
  </defs>

  <!-- ===================== HEADER ===================== -->
  <text x="700" y="42" text-anchor="middle" font-size="30" font-weight="700" fill="#1a237e">
    BNC_Sender — proces, wartość i rozwój
  </text>
  <text x="700" y="72" text-anchor="middle" font-size="15" fill="#546e7a">
    Faza A (obecna) · workflow biznesowy · plan rozwoju Faza B
  </text>

  <!-- ===================== PANEL: FAZA A (intro + wartość) ===================== -->
  <rect x="20" y="100" width="1360" height="200" rx="12" fill="url(#phaseAPanel)" stroke="#546e7a" stroke-width="2"/>

  <rect x="20" y="100" width="220" height="200" rx="12" fill="#37474f"/>
  <text x="130" y="180" text-anchor="middle" font-size="26" font-weight="700" fill="white">FAZA A</text>
  <text x="130" y="210" text-anchor="middle" font-size="13" fill="#cfd8dc">aktualny stan</text>
  <text x="130" y="232" text-anchor="middle" font-size="11" fill="#b0bec5" font-style="italic">v1.0.0 (target)</text>

  <!-- Panel 1: Co zastępujemy -->
  <rect x="260" y="125" width="350" height="160" rx="8" fill="#ffffff" stroke="#ef6c00" stroke-width="2"/>
  <text x="280" y="150" font-size="14" font-weight="700" fill="#bf360c">⚠ CO ZASTĘPUJEMY</text>
  <text x="280" y="178" font-size="13" fill="#37474f">manualnie wypełniany Excel</text>
  <text x="280" y="198" font-size="13" fill="#37474f">+ ręczne wysyłanie mailem</text>
  <text x="280" y="218" font-size="13" fill="#37474f">+ ręczne forwardowanie</text>
  <text x="280" y="238" font-size="13" fill="#37474f">przez kierownika do BNC</text>
  <text x="280" y="265" font-size="12" fill="#b0bec5" font-style="italic">→ brak audytu, błędy formatu,</text>
  <text x="280" y="280" font-size="12" fill="#b0bec5" font-style="italic">opóźnienia, frustracja userów</text>

  <!-- Panel 2: Co dostarczamy -->
  <rect x="630" y="125" width="350" height="160" rx="8" fill="#ffffff" stroke="#388e3c" stroke-width="2"/>
  <text x="650" y="150" font-size="14" font-weight="700" fill="#1b5e20">✓ CO DOSTARCZAMY</text>
  <text x="650" y="178" font-size="13" fill="#37474f">aplikacja BNC_Sender z:</text>
  <text x="650" y="200" font-size="13" fill="#37474f">• jednolitym formatem zgłoszenia</text>
  <text x="650" y="218" font-size="13" fill="#37474f">• walidacją danych (CNA, email, FK)</text>
  <text x="650" y="236" font-size="13" fill="#37474f">• auto-routingiem (handlowiec/kierownik)</text>
  <text x="650" y="254" font-size="13" fill="#37474f">• audit trail (kto, kiedy, do kogo)</text>
  <text x="650" y="278" font-size="12" fill="#558b2f" font-style="italic">→ batch wysyłka 1 klikiem</text>

  <!-- Panel 3: Wartość biznesowa -->
  <rect x="1000" y="125" width="380" height="160" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
  <text x="1020" y="150" font-size="14" font-weight="700" fill="#0d47a1">💼 WARTOŚĆ BIZNESOWA</text>
  <text x="1020" y="178" font-size="13" fill="#37474f"><tspan font-weight="600">Szybciej</tspan> — batch zamiast pojedynczych maili</text>
  <text x="1020" y="200" font-size="13" fill="#37474f"><tspan font-weight="600">Mniej błędów</tspan> — walidacja przed wysyłką</text>
  <text x="1020" y="222" font-size="13" fill="#37474f"><tspan font-weight="600">Dowód kontaktu</tspan> — audit trail dla reklamacji</text>
  <text x="1020" y="244" font-size="13" fill="#37474f"><tspan font-weight="600">Spójność</tspan> — jednolity format w całej firmie</text>
  <text x="1020" y="270" font-size="12" fill="#1565c0" font-style="italic">→ skala: ~30 zgłoszeń/handlowiec/miesiąc</text>

  <!-- ===================== SWIM LANES ===================== -->
  <rect x="20" y="320" width="460" height="900" rx="10" fill="url(#laneGreen)" stroke="#388e3c" stroke-width="2"/>
  <rect x="490" y="320" width="430" height="900" rx="10" fill="url(#laneOrange)" stroke="#ef6c00" stroke-width="2"/>
  <rect x="930" y="320" width="450" height="900" rx="10" fill="url(#laneBlue)" stroke="#1565c0" stroke-width="2"/>

  <rect x="20" y="320" width="460" height="46" rx="10" fill="#388e3c"/>
  <rect x="20" y="350" width="460" height="16" fill="#388e3c"/>
  <text x="250" y="352" text-anchor="middle" font-size="20" font-weight="700" fill="white">HANDLOWIEC</text>

  <rect x="490" y="320" width="430" height="46" rx="10" fill="#ef6c00"/>
  <rect x="490" y="350" width="430" height="16" fill="#ef6c00"/>
  <text x="705" y="352" text-anchor="middle" font-size="20" font-weight="700" fill="white">KIEROWNIK</text>

  <rect x="930" y="320" width="450" height="46" rx="10" fill="#1565c0"/>
  <rect x="930" y="350" width="450" height="16" fill="#1565c0"/>
  <text x="1155" y="352" text-anchor="middle" font-size="20" font-weight="700" fill="white">ZESPÓŁ BNC</text>

  <!-- ============== HANDLOWIEC FLOW ============== -->
  <circle cx="250" cy="400" r="18" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <text x="250" y="406" text-anchor="middle" font-size="14" font-weight="700" fill="white">START</text>

  <line x1="250" y1="418" x2="250" y2="450" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <rect x="80" y="452" width="340" height="68" rx="8" fill="white" stroke="#388e3c" stroke-width="2"/>
  <text x="250" y="478" text-anchor="middle" font-size="15" font-weight="700" fill="#1b5e20">1. Pozyskuje nowego klienta</text>
  <text x="250" y="500" text-anchor="middle" font-size="12" fill="#37474f">spotkanie biznesowe, prezentacja oferty</text>

  <line x1="250" y1="520" x2="250" y2="540" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <rect x="80" y="542" width="340" height="86" rx="8" fill="white" stroke="#388e3c" stroke-width="2"/>
  <text x="250" y="568" text-anchor="middle" font-size="15" font-weight="700" fill="#1b5e20">2. Wprowadza zgłoszenie</text>
  <text x="250" y="590" text-anchor="middle" font-size="12" fill="#37474f">dane klienta + miesiąc zgłoszenia</text>
  <text x="250" y="612" text-anchor="middle" font-size="11" fill="#558b2f" font-style="italic">może powtórzyć — typowo 10-30 zgłoszeń w miesiącu</text>

  <path d="M 420 585 Q 460 585 460 565 Q 460 545 420 545" fill="none" stroke="#558b2f" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrowGreen)"/>
  <text x="468" y="570" font-size="10" fill="#558b2f" font-style="italic">↻ kolejne</text>

  <line x1="250" y1="628" x2="250" y2="648" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <rect x="80" y="650" width="340" height="68" rx="8" fill="white" stroke="#388e3c" stroke-width="2"/>
  <text x="250" y="676" text-anchor="middle" font-size="15" font-weight="700" fill="#1b5e20">3. Wysyła wnioski BNC</text>
  <text x="250" y="698" text-anchor="middle" font-size="12" fill="#37474f">pojedynczo lub batchem z miesiąca</text>

  <line x1="250" y1="718" x2="250" y2="740" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- DIAMOND -->
  <polygon points="250,745 380,825 250,905 120,825" fill="#fff3e0" stroke="#ef6c00" stroke-width="2.5"/>
  <text x="250" y="815" text-anchor="middle" font-size="14" font-weight="700" fill="#bf360c">Czy handlowiec</text>
  <text x="250" y="835" text-anchor="middle" font-size="14" font-weight="700" fill="#bf360c">jest jednocześnie</text>
  <text x="250" y="855" text-anchor="middle" font-size="14" font-weight="700" fill="#bf360c">kierownikiem?</text>

  <line x1="380" y1="825" x2="490" y2="825" stroke="#e65100" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="410" y="815" font-size="13" font-weight="700" fill="#bf360c">NIE</text>
  <text x="410" y="843" font-size="11" fill="#bf360c" font-style="italic">(typowo)</text>

  <path d="M 250 905 L 250 1014 L 970 1014" fill="none" stroke="#0d47a1" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowBlue)"/>
  <text x="195" y="930" font-size="13" font-weight="700" fill="#0d47a1">TAK</text>
  <text x="120" y="950" font-size="11" fill="#0d47a1" font-style="italic">(rzadziej — gdy</text>
  <text x="120" y="965" font-size="11" fill="#0d47a1" font-style="italic">handlowiec=kierownik)</text>

  <!-- ============== KIEROWNIK FLOW ============== -->
  <rect x="530" y="792" width="350" height="68" rx="8" fill="white" stroke="#ef6c00" stroke-width="2"/>
  <text x="705" y="818" text-anchor="middle" font-size="15" font-weight="700" fill="#bf360c">4. Otrzymuje wnioski mailem</text>
  <text x="705" y="840" text-anchor="middle" font-size="12" fill="#37474f">od swojego handlowca</text>

  <line x1="705" y1="860" x2="705" y2="880" stroke="#e65100" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <rect x="530" y="882" width="350" height="86" rx="8" fill="white" stroke="#ef6c00" stroke-width="2"/>
  <text x="705" y="908" text-anchor="middle" font-size="15" font-weight="700" fill="#bf360c">5. Weryfikuje i akceptuje</text>
  <text x="705" y="930" text-anchor="middle" font-size="12" fill="#37474f">sprawdza poprawność zgłoszenia</text>
  <text x="705" y="952" text-anchor="middle" font-size="11" fill="#ef6c00" font-style="italic">control gate — kierownik ponosi odpowiedzialność</text>

  <line x1="880" y1="925" x2="970" y2="1005" stroke="#e65100" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="900" y="975" font-size="11" font-weight="600" fill="#e65100" font-style="italic">forward do BNC</text>

  <!-- ============== BNC FLOW ============== -->
  <rect x="970" y="980" width="370" height="68" rx="8" fill="white" stroke="#1565c0" stroke-width="2"/>
  <text x="1155" y="1006" text-anchor="middle" font-size="15" font-weight="700" fill="#0d47a1">6. Otrzymuje wnioski</text>
  <text x="1155" y="1028" text-anchor="middle" font-size="12" fill="#37474f">od kierownika lub wprost od handlowca</text>

  <line x1="1155" y1="1048" x2="1155" y2="1068" stroke="#0d47a1" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <rect x="970" y="1070" width="370" height="68" rx="8" fill="white" stroke="#1565c0" stroke-width="2"/>
  <text x="1155" y="1096" text-anchor="middle" font-size="15" font-weight="700" fill="#0d47a1">7. Weryfikuje dane klienta</text>
  <text x="1155" y="1118" text-anchor="middle" font-size="12" fill="#37474f">kontrola jakości po stronie BNC</text>

  <line x1="1155" y1="1138" x2="1155" y2="1158" stroke="#0d47a1" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <rect x="970" y="1160" width="370" height="68" rx="8" fill="url(#endBox)" stroke="#f57c00" stroke-width="3"/>
  <text x="1155" y="1186" text-anchor="middle" font-size="15" font-weight="700" fill="#bf360c">8. Rejestruje w programie BNC</text>
  <text x="1155" y="1208" text-anchor="middle" font-size="12" fill="#37474f">klient kwalifikuje się do bonusu</text>

  <!-- ============== ADNOTACJE pod swim lanes ============== -->
  <rect x="60" y="1245" width="850" height="50" rx="6" fill="#fafafa" stroke="#90a4ae" stroke-width="1"/>
  <text x="80" y="1265" font-size="12" font-weight="700" fill="#37474f">Audit trail dla reklamacji:</text>
  <text x="80" y="1284" font-size="11" fill="#546e7a">każdy wniosek zapisywany z adresatem i datą wysyłki — w razie sporu „BNC nie dostało zgłoszenia" handlowiec ma dowód kontaktu.</text>

  <!-- ===================== PANEL: FAZA B (rozwój) ===================== -->
  <rect x="20" y="1310" width="1360" height="230" rx="12" fill="url(#phaseBPanel)" stroke="#4527a0" stroke-width="2"/>

  <rect x="20" y="1310" width="220" height="230" rx="12" fill="#4527a0"/>
  <text x="130" y="1395" text-anchor="middle" font-size="26" font-weight="700" fill="white">FAZA B</text>
  <text x="130" y="1425" text-anchor="middle" font-size="13" fill="#d1c4e9">planowany rozwój</text>
  <text x="130" y="1447" text-anchor="middle" font-size="11" fill="#b39ddb" font-style="italic">po wdrożeniu Fazy A</text>

  <!-- Panel B1: SQL Server -->
  <rect x="260" y="1335" width="500" height="180" rx="8" fill="#ffffff" stroke="#4527a0" stroke-width="2"/>
  <text x="280" y="1360" font-size="14" font-weight="700" fill="#311b92">🗄 BAZA DANYCH MS SQL SERVER</text>
  <text x="280" y="1388" font-size="13" fill="#37474f">Centralne miejsce dla wszystkich zgłoszeń BNC</text>
  <text x="280" y="1408" font-size="12" fill="#546e7a">— zamiast rozproszonych plików xlsx u każdego handlowca</text>
  <text x="280" y="1428" font-size="12" fill="#546e7a">— spójna historia, raportowanie cross-team</text>
  <text x="280" y="1448" font-size="12" fill="#546e7a">— integracja z innymi systemami firmy (CRM, finanse)</text>
  <text x="280" y="1478" font-size="12" font-weight="600" fill="#4527a0">Konsekwencja:</text>
  <text x="280" y="1497" font-size="12" fill="#37474f">zespół BNC widzi WSZYSTKIE wnioski w jednym dashboardzie</text>

  <!-- Panel B2: Power Automate + acceptance flow -->
  <rect x="780" y="1335" width="600" height="180" rx="8" fill="#ffffff" stroke="#4527a0" stroke-width="2"/>
  <text x="800" y="1360" font-size="14" font-weight="700" fill="#311b92">⚡ AKCEPTACJA „1 KLIKIEM" (Power Automate)</text>
  <text x="800" y="1388" font-size="13" fill="#37474f">Kierownik <tspan font-weight="700">nie forwarduje</tspan> już ręcznie wniosku do BNC.</text>
  <text x="800" y="1410" font-size="12" fill="#37474f">Mail przychodzący do kierownika ma przycisk <tspan font-weight="700" fill="#4527a0">[Akceptuj]</tspan></text>
  <text x="800" y="1430" font-size="12" fill="#37474f">→ kliknięcie uruchamia flow Power Automate:</text>
  <text x="820" y="1450" font-size="11" fill="#546e7a">1. zapisuje akceptację w SQL Server</text>
  <text x="820" y="1466" font-size="11" fill="#546e7a">2. automatycznie przekazuje wniosek do zespołu BNC</text>
  <text x="820" y="1482" font-size="11" fill="#546e7a">3. zwraca status do handlowca (notyfikacja „przyjęte")</text>
  <text x="800" y="1505" font-size="12" font-weight="600" fill="#4527a0">Korzyść:</text>
  <text x="855" y="1505" font-size="12" fill="#37474f">eliminacja manualnego forwardu, czas kierownika ↓ o ~70%</text>

  <!-- Strzałka łącząca z workflow do FAZY B (kierownik akcja) -->
  <path d="M 705 1230 L 705 1310" fill="none" stroke="#4527a0" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <text x="715" y="1275" font-size="11" font-weight="600" fill="#4527a0" font-style="italic">krok 5 ewoluuje →</text>
</svg>
</body>
</html>
