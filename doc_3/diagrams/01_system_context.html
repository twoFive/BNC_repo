<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BNC_Sender — System Context (C4 Level 1)</title>
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; }
  body { width: 1400px; height: 1000px; }
  svg { display: block; }
</style>
</head>
<body>
<svg width="1400" height="1000" viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#37474f"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0d47a1"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#546e7a"/>
    </marker>
    <linearGradient id="systemBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1976d2"/><stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="personBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9"/><stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="externalBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eceff1"/><stop offset="100%" stop-color="#cfd8dc"/>
    </linearGradient>
  </defs>

  <!-- TITLE -->
  <text x="700" y="45" text-anchor="middle" font-size="30" font-weight="700" fill="#1a237e">
    BNC_Sender — System Context (C4 Level 1)
  </text>
  <text x="700" y="75" text-anchor="middle" font-size="15" fill="#546e7a">
    Aktorzy i systemy zewnętrzne · widok statyczny · Faza A
  </text>

  <!-- ============== SYSTEM CENTRALNY: BNC_Sender ============== -->
  <rect x="500" y="430" width="400" height="160" rx="14" fill="url(#systemBox)" stroke="#0d47a1" stroke-width="3"/>
  <text x="700" y="468" text-anchor="middle" font-size="14" font-weight="600" fill="#bbdefb">[System w zakresie projektu]</text>
  <text x="700" y="500" text-anchor="middle" font-size="24" font-weight="700" fill="white">BNC_Sender</text>
  <text x="700" y="525" text-anchor="middle" font-size="13" fill="#e3f2fd">aplikacja Excel/VBA do zgłaszania</text>
  <text x="700" y="545" text-anchor="middle" font-size="13" fill="#e3f2fd">nowych klientów do programu BNC</text>
  <text x="700" y="572" text-anchor="middle" font-size="11" fill="#90caf9" font-style="italic">Faza A · v0.1.0 (target)</text>

  <!-- ============== PERSONS ============== -->

  <!-- Handlowiec (top-left) -->
  <rect x="80" y="140" width="280" height="130" rx="12" fill="url(#personBox)" stroke="#388e3c" stroke-width="2.5"/>
  <circle cx="125" cy="180" r="14" fill="#388e3c" stroke="#1b5e20" stroke-width="2"/>
  <text x="125" y="186" text-anchor="middle" font-size="14" font-weight="700" fill="white">👤</text>
  <text x="220" y="180" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="600">[Person]</text>
  <text x="220" y="208" text-anchor="middle" font-size="18" font-weight="700" fill="#1b5e20">Handlowiec</text>
  <text x="220" y="230" text-anchor="middle" font-size="12" fill="#37474f">pozyskuje klientów, zgłasza do</text>
  <text x="220" y="248" text-anchor="middle" font-size="12" fill="#37474f">programu BNC</text>
  <text x="220" y="265" text-anchor="middle" font-size="11" fill="#558b2f" font-style="italic">~20 osób w zespole</text>

  <!-- Kierownik handlowca (top-right) -->
  <rect x="1040" y="140" width="280" height="130" rx="12" fill="url(#personBox)" stroke="#388e3c" stroke-width="2.5"/>
  <circle cx="1085" cy="180" r="14" fill="#388e3c" stroke="#1b5e20" stroke-width="2"/>
  <text x="1085" y="186" text-anchor="middle" font-size="14" font-weight="700" fill="white">👤</text>
  <text x="1180" y="180" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="600">[Person]</text>
  <text x="1180" y="208" text-anchor="middle" font-size="18" font-weight="700" fill="#1b5e20">Kierownik handlowca</text>
  <text x="1180" y="230" text-anchor="middle" font-size="12" fill="#37474f">akceptuje zgłoszenia,</text>
  <text x="1180" y="248" text-anchor="middle" font-size="12" fill="#37474f">forwarduje do zespołu BNC</text>
  <text x="1180" y="265" text-anchor="middle" font-size="11" fill="#558b2f" font-style="italic">~5 osób (1 per oddział)</text>

  <!-- Zespół BNC (bottom-right) -->
  <rect x="1040" y="760" width="280" height="130" rx="12" fill="url(#personBox)" stroke="#388e3c" stroke-width="2.5"/>
  <circle cx="1085" cy="800" r="14" fill="#388e3c" stroke="#1b5e20" stroke-width="2"/>
  <text x="1085" y="806" text-anchor="middle" font-size="14" font-weight="700" fill="white">👥</text>
  <text x="1180" y="800" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="600">[Person — zespół]</text>
  <text x="1180" y="828" text-anchor="middle" font-size="18" font-weight="700" fill="#1b5e20">Zespół BNC</text>
  <text x="1180" y="850" text-anchor="middle" font-size="12" fill="#37474f">weryfikuje, rejestruje klientów</text>
  <text x="1180" y="868" text-anchor="middle" font-size="12" fill="#37474f">w programie Bonus New Client</text>
  <text x="1180" y="885" text-anchor="middle" font-size="11" fill="#558b2f" font-style="italic">jednostka centralna firmy</text>

  <!-- Dział IT (bottom-left) -->
  <rect x="80" y="760" width="280" height="130" rx="12" fill="url(#personBox)" stroke="#388e3c" stroke-width="2.5"/>
  <circle cx="125" cy="800" r="14" fill="#388e3c" stroke="#1b5e20" stroke-width="2"/>
  <text x="125" y="806" text-anchor="middle" font-size="14" font-weight="700" fill="white">⚙</text>
  <text x="220" y="800" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="600">[Person — zespół]</text>
  <text x="220" y="828" text-anchor="middle" font-size="18" font-weight="700" fill="#1b5e20">Dział IT</text>
  <text x="220" y="850" text-anchor="middle" font-size="12" fill="#37474f">konfiguruje Trusted Locations,</text>
  <text x="220" y="868" text-anchor="middle" font-size="12" fill="#37474f">polityki Outlook, deploy</text>
  <text x="220" y="885" text-anchor="middle" font-size="11" fill="#558b2f" font-style="italic">jednorazowo + utrzymanie</text>

  <!-- ============== EXTERNAL SYSTEMS ============== -->

  <!-- OneDrive firmowy (top-center) -->
  <rect x="560" y="140" width="280" height="130" rx="12" fill="url(#externalBox)" stroke="#455a64" stroke-width="2.5"/>
  <text x="700" y="170" text-anchor="middle" font-size="11" fill="#263238" font-weight="600">[System zewnętrzny]</text>
  <text x="700" y="200" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">OneDrive firmowy</text>
  <text x="700" y="223" text-anchor="middle" font-size="12" fill="#37474f">dystrybucja release'u</text>
  <text x="700" y="242" text-anchor="middle" font-size="12" fill="#37474f">BNC_Sender_v*.xlsm</text>
  <text x="700" y="260" text-anchor="middle" font-size="11" fill="#78909c" font-style="italic">Microsoft 365 (infra firmowa)</text>

  <!-- Outlook (lewa strona, blisko BNC_Sender) -->
  <rect x="100" y="430" width="260" height="160" rx="12" fill="url(#externalBox)" stroke="#455a64" stroke-width="2.5"/>
  <text x="230" y="460" text-anchor="middle" font-size="11" fill="#263238" font-weight="600">[System zewnętrzny]</text>
  <text x="230" y="490" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">Outlook</text>
  <text x="230" y="510" text-anchor="middle" font-size="13" fill="#37474f">klient mailowy lokalny</text>
  <text x="230" y="535" text-anchor="middle" font-size="11" fill="#37474f">wysyłka wniosków BNC</text>
  <text x="230" y="552" text-anchor="middle" font-size="11" fill="#37474f">przez COM (MailItem.Send)</text>
  <text x="230" y="578" text-anchor="middle" font-size="11" fill="#78909c" font-style="italic">Microsoft Office, na laptopie</text>

  <!-- Exchange firmowy (prawa strona, blisko BNC_Sender) -->
  <rect x="1040" y="430" width="280" height="160" rx="12" fill="url(#externalBox)" stroke="#455a64" stroke-width="2.5"/>
  <text x="1180" y="460" text-anchor="middle" font-size="11" fill="#263238" font-weight="600">[System zewnętrzny]</text>
  <text x="1180" y="490" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">Exchange firmowy</text>
  <text x="1180" y="510" text-anchor="middle" font-size="13" fill="#37474f">serwer maili korporacyjny</text>
  <text x="1180" y="535" text-anchor="middle" font-size="11" fill="#37474f">SMTP, dystrybucja</text>
  <text x="1180" y="552" text-anchor="middle" font-size="11" fill="#37474f">do skrzynek docelowych</text>
  <text x="1180" y="578" text-anchor="middle" font-size="11" fill="#78909c" font-style="italic">infrastruktura IT</text>

  <!-- ============== RELACJE ============== -->

  <!-- Handlowiec → BNC_Sender: uses -->
  <line x1="320" y1="270" x2="540" y2="430" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="335" y="320" width="170" height="44" rx="4" fill="white" stroke="#2e7d32" stroke-width="1"/>
  <text x="420" y="338" text-anchor="middle" font-size="11" font-weight="600" fill="#1b5e20">używa aplikacji</text>
  <text x="420" y="354" text-anchor="middle" font-size="10" fill="#37474f">do zgłaszania klientów</text>

  <!-- BNC_Sender → Outlook: wysyła przez COM -->
  <line x1="500" y1="510" x2="360" y2="510" stroke="#0d47a1" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <rect x="370" y="488" width="125" height="40" rx="4" fill="white" stroke="#0d47a1" stroke-width="1"/>
  <text x="432" y="505" text-anchor="middle" font-size="11" font-weight="600" fill="#0d47a1">wywołuje COM</text>
  <text x="432" y="520" text-anchor="middle" font-size="10" fill="#37474f">MailItem.Send</text>

  <!-- BNC_Sender → Exchange (przez Outlook): tylko logiczna strzałka -->
  <line x1="900" y1="510" x2="1040" y2="510" stroke="#546e7a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <rect x="905" y="488" width="130" height="40" rx="4" fill="white" stroke="#546e7a" stroke-width="1"/>
  <text x="970" y="505" text-anchor="middle" font-size="11" font-weight="600" fill="#546e7a">treść maila →</text>
  <text x="970" y="520" text-anchor="middle" font-size="10" fill="#37474f">via Outlook + SMTP</text>

  <!-- Exchange → Kierownik (gdy handlowiec ≠ kierownik) -->
  <line x1="1180" y1="430" x2="1180" y2="270" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowGray)"/>
  <rect x="1198" y="320" width="135" height="44" rx="4" fill="white" stroke="#546e7a" stroke-width="1"/>
  <text x="1265" y="338" text-anchor="middle" font-size="11" font-weight="600" fill="#37474f">dostarcza mail</text>
  <text x="1265" y="354" text-anchor="middle" font-size="10" fill="#78909c" font-style="italic">(typowo)</text>

  <!-- Exchange → Zespół BNC -->
  <line x1="1180" y1="590" x2="1180" y2="760" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowGray)"/>
  <rect x="1198" y="645" width="135" height="60" rx="4" fill="white" stroke="#546e7a" stroke-width="1"/>
  <text x="1265" y="663" text-anchor="middle" font-size="11" font-weight="600" fill="#37474f">dostarcza mail</text>
  <text x="1265" y="678" text-anchor="middle" font-size="10" fill="#78909c" font-style="italic">(gdy handlowiec=</text>
  <text x="1265" y="691" text-anchor="middle" font-size="10" fill="#78909c" font-style="italic">kierownik LUB po</text>
  <text x="1265" y="703" text-anchor="middle" font-size="10" fill="#78909c" font-style="italic">forwardzie kierownika)</text>

  <!-- Kierownik → Zespół BNC: forwarduje (działanie poza systemem) -->
  <path d="M 1180 270 Q 1380 470 1330 760" fill="none" stroke="#bf360c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <rect x="1310" y="490" width="130" height="60" rx="4" fill="#fff3e0" stroke="#bf360c" stroke-width="1.5"/>
  <text x="1375" y="508" text-anchor="middle" font-size="11" font-weight="700" fill="#bf360c">manualnie</text>
  <text x="1375" y="523" text-anchor="middle" font-size="10" fill="#37474f">forwarduje do BNC</text>
  <text x="1375" y="538" text-anchor="middle" font-size="9" fill="#bf360c" font-style="italic">(eliminuje się w Fazie B)</text>

  <!-- IT → BNC_Sender: konfiguruje policies -->
  <line x1="320" y1="760" x2="500" y2="590" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="335" y="660" width="170" height="44" rx="4" fill="white" stroke="#2e7d32" stroke-width="1"/>
  <text x="420" y="678" text-anchor="middle" font-size="11" font-weight="600" fill="#1b5e20">konfiguruje</text>
  <text x="420" y="694" text-anchor="middle" font-size="10" fill="#37474f">Trust Locations · COM trust</text>

  <!-- IT → OneDrive: publishes release -->
  <path d="M 220 760 Q 220 500 560 200" fill="none" stroke="#2e7d32" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <rect x="60" y="500" width="160" height="40" rx="4" fill="white" stroke="#2e7d32" stroke-width="1"/>
  <text x="140" y="518" text-anchor="middle" font-size="11" font-weight="600" fill="#1b5e20">publishuje release</text>
  <text x="140" y="533" text-anchor="middle" font-size="10" fill="#37474f">.xlsm na firmowy share</text>

  <!-- OneDrive → Handlowiec: pobiera xlsm -->
  <line x1="560" y1="220" x2="365" y2="220" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowGray)"/>
  <rect x="370" y="200" width="130" height="40" rx="4" fill="white" stroke="#546e7a" stroke-width="1"/>
  <text x="435" y="218" text-anchor="middle" font-size="11" font-weight="600" fill="#546e7a">pobiera xlsm</text>
  <text x="435" y="232" text-anchor="middle" font-size="10" fill="#37474f">(jednorazowo)</text>

  <!-- ============== LEGENDA ============== -->
  <rect x="60" y="920" width="1280" height="70" rx="8" fill="#fafafa" stroke="#90a4ae" stroke-width="1.5"/>
  <text x="80" y="942" font-size="13" font-weight="700" fill="#37474f">Legenda C4 Level 1:</text>
  <text x="80" y="965" font-size="11" fill="#37474f"><tspan font-weight="600">█ niebieski</tspan> = system w zakresie projektu ·  <tspan fill="#1b5e20" font-weight="600">█ zielony</tspan> = aktor (osoba/zespół) ·  <tspan fill="#455a64" font-weight="600">█ szary</tspan> = system zewnętrzny ·  <tspan fill="#bf360c" font-weight="600">⇢ czerwona przerywana</tspan> = działanie ręczne (eliminowane w Fazie B)</text>
  <text x="80" y="982" font-size="11" fill="#546e7a" font-style="italic">Widok statyczny — pokazuje KTO/CO styka się z systemem, NIE kolejność działań. Sekwencja procesu: patrz `06_business_process.jpg`.</text>
</svg>

</html>
